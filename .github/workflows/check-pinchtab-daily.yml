name: Check PinchTab Daily

on:
  schedule:
    - cron: "0 0 * * *"  # Daily at midnight UTC
  workflow_dispatch:  # Allow manual trigger for testing

permissions:
  contents: write
  pull-requests: write

jobs:
  check-update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Get current pinchtab version
        id: current
        run: |
          CURRENT=$(node -p "require('./package-lock.json').packages['node_modules/pinchtab'].version")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current pinchtab version: $CURRENT"

      - name: Get latest pinchtab version
        id: latest
        run: |
          LATEST=$(npm view pinchtab version)
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest pinchtab version: $LATEST"

      - name: Compare versions
        id: compare
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LATEST="${{ steps.latest.outputs.version }}"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "✅ PinchTab is up to date ($CURRENT)"
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "🔄 Update available: $CURRENT → $LATEST"
          fi

      - name: Check if PR already exists
        if: steps.compare.outputs.needs_update == 'true'
        id: check_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="dependabot/npm_and_yarn/pinchtab-${{ steps.latest.outputs.version }}"

          # Check if branch exists
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Branch $BRANCH already exists, skipping PR creation"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "✅ No existing branch found, will create PR"
          fi

      - name: Create update PR
        if: steps.compare.outputs.needs_update == 'true' && steps.check_pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LATEST="${{ steps.latest.outputs.version }}"
          BRANCH="dependabot/npm_and_yarn/pinchtab-$LATEST"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create and switch to new branch
          git checkout -b "$BRANCH"

          # Update pinchtab
          npm install pinchtab@latest

          # Commit changes
          git add package.json package-lock.json
          git commit -m "chore(deps): bump pinchtab from $CURRENT to $LATEST

Bumps [pinchtab](https://github.com/rethinkbooks/pinchtab) from $CURRENT to $LATEST.

---
updated-dependencies:
- dependency-name: pinchtab
  dependency-type: direct:production
...

🤖 Generated by check-pinchtab-daily workflow"

          # Push branch
          git push origin "$BRANCH"

          # Create PR
          gh pr create \
            --title "chore(deps): bump pinchtab from $CURRENT to $LATEST" \
            --body "$(cat <<'EOF'
Bumps [pinchtab](https://github.com/rethinkbooks/pinchtab) from $CURRENT to $LATEST.

## Changelog
Check the [PinchTab releases](https://github.com/rethinkbooks/pinchtab/releases) for detailed changes.

## Auto-merge Status
This PR will be automatically merged if:
- ✅ All CI checks pass (tsc, lint, fmt, spell, test, security audit, build)
- ✅ Version change is patch or minor (major versions require manual review)

---
🤖 This PR was automatically created by the [check-pinchtab-daily](.github/workflows/check-pinchtab-daily.yml) workflow.
EOF
)" \
            --label "dependencies,pinchtab-update" \
            --base main \
            --head "$BRANCH"

      - name: Summary
        run: |
          if [ "${{ steps.compare.outputs.needs_update }}" = "false" ]; then
            echo "✅ PinchTab is up to date (${{ steps.current.outputs.version }})"
          elif [ "${{ steps.check_pr.outputs.exists }}" = "true" ]; then
            echo "⚠️ PR already exists for pinchtab ${{ steps.latest.outputs.version }}"
          else
            echo "✅ Created PR for pinchtab ${{ steps.current.outputs.version }} → ${{ steps.latest.outputs.version }}"
          fi
